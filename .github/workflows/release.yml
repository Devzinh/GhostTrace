name: Release GhostTrace

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install WiX v4
        run: dotnet tool install --global wix

      - name: Restore
        run: dotnet restore

      - name: Build main project
        run: dotnet build --configuration Release --no-restore

      - name: Build MSI pt-BR
        run: |
          dotnet build src/GhostTrace.Installer --configuration Release -p:Culture=pt-BR
          $msi = Get-ChildItem -Path "src/GhostTrace.Installer/bin/x64/Release" -Filter "*.msi" -Recurse | Select-Object -First 1
          Write-Host "Found MSI: $($msi.FullName)"
          Copy-Item $msi.FullName "GhostTrace-${{ github.ref_name }}-pt-BR-x64.msi"

      - name: Build MSI en-US
        run: |
          dotnet build src/GhostTrace.Installer --configuration Release -p:Culture=en-US
          $msi = Get-ChildItem -Path "src/GhostTrace.Installer/bin/x64/Release" -Filter "*.msi" -Recurse | Select-Object -First 1
          Write-Host "Found MSI: $($msi.FullName)"
          Copy-Item $msi.FullName "GhostTrace-${{ github.ref_name }}-en-US-x64.msi"

      - name: Build MSI es-ES
        run: |
          dotnet build src/GhostTrace.Installer --configuration Release -p:Culture=es-ES
          $msi = Get-ChildItem -Path "src/GhostTrace.Installer/bin/x64/Release" -Filter "*.msi" -Recurse | Select-Object -First 1
          Write-Host "Found MSI: $($msi.FullName)"
          Copy-Item $msi.FullName "GhostTrace-${{ github.ref_name }}-es-ES-x64.msi"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "GhostTrace ${{ github.ref_name }}"
          draft: true
          prerelease: false
          body: |
            ## GhostTrace ${{ github.ref_name }}

            > "Desinstalou? Ele ainda ta aqui, bestinha."

            ### Download
            Escolha o instalador no seu idioma:

            | Idioma | Arquivo |
            |--------|---------|
            | Português Brasil | `GhostTrace-${{ github.ref_name }}-pt-BR-x64.msi` |
            | English          | `GhostTrace-${{ github.ref_name }}-en-US-x64.msi` |
            | Español          | `GhostTrace-${{ github.ref_name }}-es-ES-x64.msi` |

            ### Requisitos
            - Windows 10/11 x64
            - .NET 10
            - Executar como Administrador (UAC necessário)

          files: |
            GhostTrace-${{ github.ref_name }}-pt-BR-x64.msi
            GhostTrace-${{ github.ref_name }}-en-US-x64.msi
            GhostTrace-${{ github.ref_name }}-es-ES-x64.msi
